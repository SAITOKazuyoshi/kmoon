<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>月の軌道ナビゲーター - 釧路・米町</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Leaflet (Maps) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- SunCalc (Astronomy Calculations) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>
    <style>
        #map { height: 100vh; width: 100%; }
        .glass-panel {
            background: rgba(15, 23, 42, 0.88);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .moon-line {
            stroke-dasharray: 10, 10;
            animation: dash 20s linear infinite;
        }
        @keyframes dash {
            to { stroke-dashoffset: -100; }
        }
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #22d3ee;
            cursor: pointer;
            border: 2px solid #0f172a;
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.4);
        }
        .collapsible-content {
            max-height: 500px;
            opacity: 1;
            overflow: hidden;
            transition: max-height 0.4s ease-in-out, opacity 0.3s ease-in-out, margin 0.4s;
        }
        .collapsible-content.collapsed {
            max-height: 0;
            opacity: 0;
            margin-top: 0 !important;
            margin-bottom: 0 !important;
            pointer-events: none;
        }
        .chevron-icon {
            transition: transform 0.4s ease;
        }
        .chevron-icon.rotated {
            transform: rotate(180deg);
        }
    </style>
</head>
<body class="bg-slate-900 text-white overflow-hidden text-sans">

    <!-- UI Overlay -->
    <div class="fixed top-2 left-2 right-2 md:right-auto md:w-85 z-[1000] space-y-3">
        <div class="glass-panel rounded-2xl shadow-2xl overflow-hidden">
            <!-- Header Area (Clickable to toggle) -->
            <div id="header-tap-area" class="p-4 md:p-5 pb-2 cursor-pointer hover:bg-white/5 transition-colors flex justify-between items-center">
                <div>
                    <h1 class="text-lg font-bold flex items-center gap-2">
                        <span>🌙</span> 月の軌道ナビ
                    </h1>
                    <p class="text-[10px] text-slate-400 tracking-wider uppercase">Kushiro Yonemachi Point</p>
                </div>
                <div class="flex items-center gap-2 bg-slate-700/40 px-3 py-1.5 rounded-xl border border-white/10">
                    <span class="text-[10px] font-bold text-slate-300 uppercase tracking-tighter" id="toggle-label">詳細</span>
                    <svg id="chevron" class="chevron-icon w-4 h-4 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path>
                    </svg>
                </div>
            </div>

            <!-- Collapsible Body -->
            <div id="ui-body" class="collapsible-content px-4 md:px-5 space-y-4">
                <!-- Date Selector -->
                <div class="space-y-1 mt-2">
                    <label class="text-[10px] font-bold uppercase tracking-widest text-slate-500">日付</label>
                    <input type="date" id="date-picker" 
                        class="w-full bg-slate-800/80 border border-white/10 rounded-xl p-2.5 text-sm text-cyan-400 focus:outline-none focus:ring-1 focus:ring-cyan-500/50 transition-all">
                </div>

                <!-- Moon Rise/Set -->
                <div class="grid grid-cols-2 gap-2 text-center border-y border-white/5 py-4">
                    <div class="border-r border-white/5">
                        <span class="block text-[9px] text-slate-500 uppercase font-black mb-1">月の出</span>
                        <span id="rise-time" class="text-base font-mono font-bold text-emerald-400">--:--</span>
                    </div>
                    <div>
                        <span class="block text-[9px] text-slate-500 uppercase font-black mb-1">月の入り</span>
                        <span id="set-time" class="text-base font-mono font-bold text-rose-400">--:--</span>
                    </div>
                </div>

                <!-- Detailed Stats Grid -->
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-slate-800/40 p-3 rounded-2xl border border-white/5 flex flex-col items-center justify-center">
                        <span class="text-[9px] text-slate-500 font-bold uppercase">現在高度</span>
                        <span id="alt-val" class="text-2xl font-mono font-bold text-yellow-400">0.0°</span>
                    </div>
                    <div class="bg-slate-800/40 p-3 rounded-2xl border border-white/5 flex flex-col items-center justify-center">
                        <span class="text-[9px] text-slate-500 font-bold uppercase">現在方位</span>
                        <span id="azi-val" class="text-2xl font-mono font-bold text-blue-400">0.0°</span>
                    </div>
                </div>

                <!-- Vertical Progress -->
                <div class="relative pb-2">
                    <div class="flex justify-between text-[10px] mb-1.5 px-1">
                        <span class="text-slate-400 font-bold">地平線からの高さ</span>
                        <span id="alt-pct" class="text-yellow-400 font-bold">0%</span>
                    </div>
                    <div class="h-2 w-full bg-slate-800 rounded-full overflow-hidden">
                        <div id="alt-bar" class="h-full bg-yellow-400 shadow-[0_0_10px_rgba(250,204,21,0.4)] transition-all duration-500" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <!-- Persistent Bottom Controls (Always Visible) -->
            <div class="p-4 md:p-5 pt-2 space-y-4 border-t border-white/10 bg-white/5">
                <div class="flex justify-between items-center">
                    <div class="flex flex-col">
                        <div class="flex items-center gap-3">
                            <span id="time-display" class="font-mono text-3xl text-cyan-400 font-black tracking-tighter">12:00</span>
                            <!-- Compact Angle Badge (Always visible) -->
                            <div id="compact-alt-container" class="flex flex-col items-center bg-yellow-400/10 px-2 py-0.5 rounded-lg border border-yellow-400/20">
                                <span class="text-[8px] text-yellow-500/80 font-black uppercase leading-none mb-0.5">高度</span>
                                <span id="compact-alt" class="text-sm font-mono font-bold text-yellow-400 leading-none">0.0°</span>
                            </div>
                        </div>
                        <span id="full-date-string" class="text-[10px] text-slate-500 font-mono mt-1 tracking-widest uppercase">2024/01/01</span>
                    </div>
                    
                    <button id="play-pause" class="bg-cyan-600 hover:bg-cyan-500 text-white w-12 h-12 rounded-2xl flex items-center justify-center transition-all active:scale-90 shadow-xl shadow-cyan-900/40">
                        <span id="play-icon" class="text-xl">▶</span>
                    </button>
                </div>

                <div class="space-y-1">
                    <input type="range" id="time-slider" min="0" max="23.99" step="0.01" value="12" 
                        class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-cyan-500">
                    <div class="flex justify-between text-[10px] text-slate-500 font-bold px-1">
                        <span>0:00</span>
                        <button id="reset-now" class="text-cyan-500/70 hover:text-cyan-400 transition-colors uppercase tracking-widest">現在時刻へ</button>
                        <span>24:00</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Moon Phase (Small Floating Card) -->
        <div id="moon-phase-card" class="glass-panel p-3 rounded-2xl shadow-xl flex items-center gap-3 collapsible-content border-l-4 border-l-cyan-500">
            <div id="moon-icon" class="text-4xl filter drop-shadow-md">🌑</div>
            <div class="flex flex-col">
                <span class="text-[9px] text-slate-500 uppercase font-black tracking-widest">選択日の月相</span>
                <span id="phase-name" class="font-bold text-sm text-slate-200">新月</span>
            </div>
        </div>
    </div>

    <!-- Map Container -->
    <div id="map"></div>

    <script>
        const OBSERVER_LAT = 42.9689954;
        const OBSERVER_LNG = 144.3731795;
        
        let map, moonLine;
        let isPlaying = false;
        let lastTimestamp = 0;
        const speedMultiplier = 0.5;

        function getTodayString() {
            return new Date().toISOString().split('T')[0];
        }

        function getCurrentTimeAsFloat() {
            const now = new Date();
            return now.getHours() + (now.getMinutes() / 60) + (now.getSeconds() / 3600);
        }

        function initMap() {
            document.getElementById('date-picker').value = getTodayString();
            document.getElementById('time-slider').value = getCurrentTimeAsFloat();

            map = L.map('map', {
                center: [OBSERVER_LAT, OBSERVER_LNG],
                zoom: 17,
                zoomControl: false
            });

            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                attribution: 'Tiles &copy; Esri'
            }).addTo(map);

            L.circleMarker([OBSERVER_LAT, OBSERVER_LNG], {
                radius: 8, fillColor: "#ff3e00", color: "#fff", weight: 3, opacity: 1, fillOpacity: 0.9
            }).addTo(map);

            moonLine = L.polyline([], {
                color: '#fbbf24', weight: 4, opacity: 0.8, className: 'moon-line'
            }).addTo(map);

            updateMoonPosition();
            requestAnimationFrame(animate);
        }

        function getMoonPhaseName(phase) {
            if (phase <= 0.03 || phase > 0.97) return ["新月", "🌑"];
            if (phase <= 0.22) return ["三日月", "🌙"];
            if (phase <= 0.28) return ["上弦の月", "🌓"];
            if (phase <= 0.47) return ["十三夜月", "🌔"];
            if (phase <= 0.53) return ["満月", "🌕"];
            if (phase <= 0.72) return ["待宵月", "🌖"];
            if (phase <= 0.78) return ["下弦の月", "🌗"];
            return ["有明月", "🌘"];
        }

        function formatTime(date) {
            if (!date) return "--:--";
            return date.getHours().toString().padStart(2, '0') + ":" + 
                   date.getMinutes().toString().padStart(2, '0');
        }

        function updateMoonPosition() {
            const selectedDateVal = document.getElementById('date-picker').value;
            const selectedTimeVal = parseFloat(document.getElementById('time-slider').value);
            
            const targetDate = new Date(selectedDateVal);
            const hours = Math.floor(selectedTimeVal);
            const minutes = Math.floor((selectedTimeVal - hours) * 60);
            const seconds = Math.floor(((selectedTimeVal - hours) * 60 - minutes) * 60);
            targetDate.setHours(hours, minutes, seconds);
            
            const moonPos = SunCalc.getMoonPosition(targetDate, OBSERVER_LAT, OBSERVER_LNG);
            const moonIllum = SunCalc.getMoonIllumination(targetDate);
            const moonTimes = SunCalc.getMoonTimes(targetDate, OBSERVER_LAT, OBSERVER_LNG);
            
            const azimuthDeg = (moonPos.azimuth * 180 / Math.PI) + 180; 
            const altitudeDeg = moonPos.altitude * 180 / Math.PI;

            document.getElementById('rise-time').innerText = formatTime(moonTimes.rise);
            document.getElementById('set-time').innerText = formatTime(moonTimes.set);
            
            const altString = altitudeDeg.toFixed(1) + "°";
            document.getElementById('alt-val').innerText = altString;
            document.getElementById('compact-alt').innerText = altString;
            document.getElementById('azi-val').innerText = azimuthDeg.toFixed(1) + "°";
            document.getElementById('time-display').innerText = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;
            
            document.getElementById('full-date-string').innerText = targetDate.toLocaleDateString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit' });

            const altPct = Math.max(0, Math.min(100, (altitudeDeg / 90) * 100));
            document.getElementById('alt-bar').style.width = altPct + "%";
            document.getElementById('alt-pct').innerText = Math.round(altPct) + "%";
            
            const [phaseName, moonEmoji] = getMoonPhaseName(moonIllum.phase);
            document.getElementById('phase-name').innerText = phaseName;
            document.getElementById('moon-icon').innerText = moonEmoji;

            const distance = 0.01; 
            const endLat = OBSERVER_LAT + (distance * Math.cos(moonPos.azimuth + Math.PI));
            const endLng = OBSERVER_LNG + (distance * Math.sin(moonPos.azimuth + Math.PI) / Math.cos(OBSERVER_LAT * Math.PI / 180));

            const compactAltBadge = document.getElementById('compact-alt-container');
            if (altitudeDeg < 0) {
                moonLine.setStyle({ color: '#475569', opacity: 0.3 });
                document.getElementById('alt-val').className = "text-2xl font-mono font-bold text-slate-500";
                compactAltBadge.className = "flex flex-col items-center bg-slate-500/10 px-2 py-0.5 rounded-lg border border-slate-500/20";
                document.getElementById('compact-alt').className = "text-sm font-mono font-bold text-slate-500 leading-none";
            } else {
                moonLine.setStyle({ color: '#fbbf24', opacity: 0.8 });
                document.getElementById('alt-val').className = "text-2xl font-mono font-bold text-yellow-400";
                compactAltBadge.className = "flex flex-col items-center bg-yellow-400/10 px-2 py-0.5 rounded-lg border border-yellow-400/20";
                document.getElementById('compact-alt').className = "text-sm font-mono font-bold text-yellow-400 leading-none";
            }

            moonLine.setLatLngs([[OBSERVER_LAT, OBSERVER_LNG], [endLat, endLng]]);
        }

        function animate(timestamp) {
            if (!lastTimestamp) lastTimestamp = timestamp;
            const deltaTime = timestamp - lastTimestamp;
            lastTimestamp = timestamp;

            if (isPlaying) {
                const slider = document.getElementById('time-slider');
                let currentValue = parseFloat(slider.value);
                currentValue += (speedMultiplier * (deltaTime / 1000));
                if (currentValue >= 24) currentValue = 0;
                slider.value = currentValue;
                updateMoonPosition();
            }
            requestAnimationFrame(animate);
        }

        // Toggle UI logic
        const toggleUI = () => {
            const body = document.getElementById('ui-body');
            const phase = document.getElementById('moon-phase-card');
            const chevron = document.getElementById('chevron');
            const label = document.getElementById('toggle-label');
            
            const isCollapsed = body.classList.toggle('collapsed');
            phase.classList.toggle('collapsed');
            chevron.classList.toggle('rotated');
            
            label.innerText = isCollapsed ? "開く" : "詳細";
        };

        document.getElementById('header-tap-area').addEventListener('click', toggleUI);
        document.getElementById('date-picker').addEventListener('change', updateMoonPosition);
        document.getElementById('time-slider').addEventListener('input', updateMoonPosition);

        document.getElementById('play-pause').addEventListener('click', () => {
            isPlaying = !isPlaying;
            document.getElementById('play-icon').innerText = isPlaying ? "⏸" : "▶";
            const btn = document.getElementById('play-pause');
            btn.className = isPlaying 
                ? "bg-amber-600 hover:bg-amber-500 text-white w-12 h-12 rounded-2xl flex items-center justify-center transition-all active:scale-90 shadow-xl shadow-amber-900/40"
                : "bg-cyan-600 hover:bg-cyan-500 text-white w-12 h-12 rounded-2xl flex items-center justify-center transition-all active:scale-90 shadow-xl shadow-cyan-900/40";
        });

        document.getElementById('reset-now').addEventListener('click', () => {
            isPlaying = false;
            document.getElementById('play-icon').innerText = "▶";
            document.getElementById('date-picker').value = getTodayString();
            document.getElementById('time-slider').value = getCurrentTimeAsFloat();
            updateMoonPosition();
        });

        window.onload = initMap;
    </script>
</body>
</html>
