<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>月の軌道ナビゲーター - 釧路・米町</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Leaflet (Maps) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- SunCalc (Astronomy Calculations) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>
    <style>
        #map { height: 100vh; width: 100%; }
        .glass-panel {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease-in-out;
        }
        .moon-line {
            stroke-dasharray: 10, 10;
            animation: dash 20s linear infinite;
        }
        @keyframes dash {
            to { stroke-dashoffset: -100; }
        }
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 18px;
            width: 18px;
            border-radius: 50%;
            background: #22d3ee;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(34, 211, 238, 0.5);
        }
        .collapsible-content {
            max-height: 1000px;
            overflow: hidden;
            transition: max-height 0.3s ease-out, opacity 0.2s;
        }
        .collapsible-content.collapsed {
            max-height: 0;
            opacity: 0;
            pointer-events: none;
            margin: 0 !important;
        }
    </style>
</head>
<body class="bg-slate-900 text-white overflow-hidden">

    <!-- UI Overlay -->
    <div class="fixed top-2 left-2 right-2 md:right-auto md:w-80 z-[1000] space-y-3">
        <div class="glass-panel p-4 md:p-5 rounded-2xl shadow-2xl">
            <!-- Header with Toggle -->
            <div class="flex justify-between items-start mb-2">
                <div>
                    <h1 class="text-lg font-bold flex items-center gap-2">
                        <span>🌙</span> 月の軌道ナビ
                    </h1>
                    <p class="text-[10px] text-slate-400">北海道釧路市米町 観測ポイント</p>
                </div>
                <button id="toggle-ui" class="bg-slate-700/50 hover:bg-slate-600 p-2 rounded-lg transition-colors text-xs" title="表示切替">
                    <span id="toggle-icon">👁️‍🗨️</span>
                </button>
            </div>

            <!-- Collapsible Sections -->
            <div id="ui-body" class="collapsible-content space-y-4 pt-2">
                <!-- Date Selector -->
                <div class="space-y-1">
                    <label class="text-[10px] uppercase tracking-wider text-slate-400">日付を選択</label>
                    <input type="date" id="date-picker" 
                        class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-sm text-cyan-400 focus:outline-none">
                </div>

                <!-- Moon Rise/Set Times -->
                <div class="grid grid-cols-2 gap-2 text-center border-y border-white/5 py-3">
                    <div>
                        <span class="block text-[10px] text-slate-400 uppercase">月の出</span>
                        <span id="rise-time" class="text-sm font-bold text-emerald-400">--:--</span>
                    </div>
                    <div>
                        <span class="block text-[10px] text-slate-400 uppercase">月の入り</span>
                        <span id="set-time" class="text-sm font-bold text-rose-400">--:--</span>
                    </div>
                </div>

                <!-- Data Display -->
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-slate-800/50 p-2 rounded-xl border border-white/5 text-center">
                        <span class="block text-[10px] text-slate-400">高度</span>
                        <span id="alt-val" class="text-xl font-mono font-bold text-yellow-400">0.0°</span>
                    </div>
                    <div class="bg-slate-800/50 p-2 rounded-xl border border-white/5 text-center">
                        <span class="block text-[10px] text-slate-400">方位</span>
                        <span id="azi-val" class="text-xl font-mono font-bold text-blue-400">0.0°</span>
                    </div>
                </div>

                <!-- Progress Bar -->
                <div class="relative pt-1">
                    <div class="flex mb-1 items-center justify-between text-[10px]">
                        <span class="text-yellow-600 bg-yellow-200/20 px-2 rounded-full font-bold">高さ (垂直)</span>
                        <span id="alt-pct" class="text-yellow-400 font-bold">0%</span>
                    </div>
                    <div class="overflow-hidden h-1.5 rounded bg-slate-700">
                        <div id="alt-bar" style="width:0%" class="h-full bg-yellow-400 transition-all duration-500"></div>
                    </div>
                </div>
            </div>

            <!-- Time Controls (Always visible or compact) -->
            <div class="space-y-3 mt-4 pt-2 border-t border-white/10">
                <div class="flex justify-between items-center">
                    <div class="flex flex-col">
                        <div class="flex items-baseline gap-2">
                            <span id="time-display" class="font-mono text-2xl text-cyan-400 font-bold">12:00</span>
                            <!-- Compact Altitude Badge -->
                            <span id="compact-alt" class="text-xs font-mono font-bold text-yellow-400 bg-yellow-400/10 px-1.5 py-0.5 rounded border border-yellow-400/20">0.0°</span>
                        </div>
                        <span id="full-date-string" class="text-[9px] text-slate-400 font-mono">----/--/--</span>
                    </div>
                    <button id="play-pause" class="bg-cyan-600 hover:bg-cyan-500 text-white p-2 px-5 rounded-xl flex items-center gap-2 transition-all active:scale-95 shadow-lg">
                        <span id="play-icon" class="text-sm">▶</span>
                        <span id="play-text" class="text-xs font-bold uppercase">再生</span>
                    </button>
                </div>

                <input type="range" id="time-slider" min="0" max="23.99" step="0.01" value="12" 
                    class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-cyan-500">
                
                <div class="flex justify-between text-[10px] text-slate-500">
                    <span>0:00</span>
                    <button id="reset-now" class="hover:text-white transition-colors underline">現在時刻</button>
                    <span>24:00</span>
                </div>
            </div>
        </div>

        <!-- Moon Phase Card (Collapsible) -->
        <div id="moon-phase-card" class="glass-panel p-3 rounded-2xl shadow-xl flex items-center gap-3 collapsible-content">
            <div id="moon-icon" class="text-3xl">🌑</div>
            <div>
                <span class="block text-[9px] text-slate-400 uppercase font-bold">月相</span>
                <span id="phase-name" class="font-bold text-sm">新月</span>
            </div>
        </div>
    </div>

    <!-- Map Container -->
    <div id="map"></div>

    <script>
        const OBSERVER_LAT = 42.9689954;
        const OBSERVER_LNG = 144.3731795;
        
        let map, moonLine;
        let isPlaying = false;
        let lastTimestamp = 0;
        const speedMultiplier = 0.5;

        function getTodayString() {
            return new Date().toISOString().split('T')[0];
        }

        function getCurrentTimeAsFloat() {
            const now = new Date();
            return now.getHours() + (now.getMinutes() / 60) + (now.getSeconds() / 3600);
        }

        function initMap() {
            document.getElementById('date-picker').value = getTodayString();
            document.getElementById('time-slider').value = getCurrentTimeAsFloat();

            map = L.map('map', {
                center: [OBSERVER_LAT, OBSERVER_LNG],
                zoom: 17,
                zoomControl: false
            });

            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                attribution: 'Tiles &copy; Esri'
            }).addTo(map);

            L.circleMarker([OBSERVER_LAT, OBSERVER_LNG], {
                radius: 8, fillColor: "#ff3e00", color: "#fff", weight: 2, opacity: 1, fillOpacity: 0.8
            }).addTo(map);

            moonLine = L.polyline([], {
                color: '#fbbf24', weight: 4, opacity: 0.8, className: 'moon-line'
            }).addTo(map);

            updateMoonPosition();
            requestAnimationFrame(animate);
        }

        function getMoonPhaseName(phase) {
            if (phase <= 0.03 || phase > 0.97) return ["新月", "🌑"];
            if (phase <= 0.22) return ["三日月", "🌙"];
            if (phase <= 0.28) return ["上弦の月", "🌓"];
            if (phase <= 0.47) return ["十三夜月", "🌔"];
            if (phase <= 0.53) return ["満月", "🌕"];
            if (phase <= 0.72) return ["待宵月", "🌖"];
            if (phase <= 0.78) return ["下弦の月", "🌗"];
            return ["有明月", "🌘"];
        }

        function formatTime(date) {
            if (!date) return "--:--";
            return date.getHours().toString().padStart(2, '0') + ":" + 
                   date.getMinutes().toString().padStart(2, '0');
        }

        function updateMoonPosition() {
            const selectedDateVal = document.getElementById('date-picker').value;
            const selectedTimeVal = parseFloat(document.getElementById('time-slider').value);
            
            const targetDate = new Date(selectedDateVal);
            const hours = Math.floor(selectedTimeVal);
            const minutes = Math.floor((selectedTimeVal - hours) * 60);
            const seconds = Math.floor(((selectedTimeVal - hours) * 60 - minutes) * 60);
            targetDate.setHours(hours, minutes, seconds);
            
            const moonPos = SunCalc.getMoonPosition(targetDate, OBSERVER_LAT, OBSERVER_LNG);
            const moonIllum = SunCalc.getMoonIllumination(targetDate);
            const moonTimes = SunCalc.getMoonTimes(targetDate, OBSERVER_LAT, OBSERVER_LNG);
            
            const azimuthDeg = (moonPos.azimuth * 180 / Math.PI) + 180; 
            const altitudeDeg = moonPos.altitude * 180 / Math.PI;

            document.getElementById('rise-time').innerText = formatTime(moonTimes.rise);
            document.getElementById('set-time').innerText = formatTime(moonTimes.set);
            
            // Update altitude displays (both main and compact)
            const altString = altitudeDeg.toFixed(1) + "°";
            document.getElementById('alt-val').innerText = altString;
            document.getElementById('compact-alt').innerText = altString;
            
            document.getElementById('azi-val').innerText = azimuthDeg.toFixed(1) + "°";
            document.getElementById('time-display').innerText = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;
            
            const fullDateStr = targetDate.toLocaleDateString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit' });
            document.getElementById('full-date-string').innerText = fullDateStr;

            const altPct = Math.max(0, Math.min(100, (altitudeDeg / 90) * 100));
            document.getElementById('alt-bar').style.width = altPct + "%";
            document.getElementById('alt-pct').innerText = Math.round(altPct) + "%";
            
            const [phaseName, moonEmoji] = getMoonPhaseName(moonIllum.phase);
            document.getElementById('phase-name').innerText = phaseName;
            document.getElementById('moon-icon').innerText = moonEmoji;

            const distance = 0.01; 
            const endLat = OBSERVER_LAT + (distance * Math.cos(moonPos.azimuth + Math.PI));
            const endLng = OBSERVER_LNG + (distance * Math.sin(moonPos.azimuth + Math.PI) / Math.cos(OBSERVER_LAT * Math.PI / 180));

            // Visibility styling for both displays
            if (altitudeDeg < 0) {
                moonLine.setStyle({ color: '#475569', opacity: 0.3 });
                document.getElementById('alt-val').classList.replace('text-yellow-400', 'text-slate-500');
                document.getElementById('compact-alt').classList.replace('text-yellow-400', 'text-slate-500');
                document.getElementById('compact-alt').classList.replace('bg-yellow-400/10', 'bg-slate-500/10');
                document.getElementById('compact-alt').classList.replace('border-yellow-400/20', 'border-slate-500/20');
            } else {
                moonLine.setStyle({ color: '#fbbf24', opacity: 0.8 });
                document.getElementById('alt-val').classList.replace('text-slate-500', 'text-yellow-400');
                document.getElementById('compact-alt').classList.replace('text-slate-500', 'text-yellow-400');
                document.getElementById('compact-alt').classList.replace('bg-slate-500/10', 'bg-yellow-400/10');
                document.getElementById('compact-alt').classList.replace('border-slate-500/20', 'border-yellow-400/20');
            }

            moonLine.setLatLngs([[OBSERVER_LAT, OBSERVER_LNG], [endLat, endLng]]);
        }

        function animate(timestamp) {
            if (!lastTimestamp) lastTimestamp = timestamp;
            const deltaTime = timestamp - lastTimestamp;
            lastTimestamp = timestamp;

            if (isPlaying) {
                const slider = document.getElementById('time-slider');
                let currentValue = parseFloat(slider.value);
                currentValue += (speedMultiplier * (deltaTime / 1000));
                if (currentValue >= 24) currentValue = 0;
                slider.value = currentValue;
                updateMoonPosition();
            }
            requestAnimationFrame(animate);
        }

        // Toggle UI Visibility
        document.getElementById('toggle-ui').addEventListener('click', () => {
            const body = document.getElementById('ui-body');
            const phase = document.getElementById('moon-phase-card');
            const icon = document.getElementById('toggle-icon');
            
            const isCollapsed = body.classList.toggle('collapsed');
            phase.classList.toggle('collapsed');
            
            icon.innerText = isCollapsed ? "➕" : "👁️‍🗨️";
        });

        document.getElementById('date-picker').addEventListener('change', updateMoonPosition);
        document.getElementById('time-slider').addEventListener('input', updateMoonPosition);

        document.getElementById('play-pause').addEventListener('click', () => {
            isPlaying = !isPlaying;
            document.getElementById('play-icon').innerText = isPlaying ? "⏸" : "▶";
            document.getElementById('play-text').innerText = isPlaying ? "停止" : "再生";
            const btn = document.getElementById('play-pause');
            if (isPlaying) {
                btn.classList.replace('bg-cyan-600', 'bg-amber-600');
            } else {
                btn.classList.replace('bg-amber-600', 'bg-cyan-600');
            }
        });

        document.getElementById('reset-now').addEventListener('click', () => {
            isPlaying = false;
            document.getElementById('play-icon').innerText = "▶";
            document.getElementById('play-text').innerText = "再生";
            document.getElementById('play-pause').classList.add('bg-cyan-600');
            document.getElementById('date-picker').value = getTodayString();
            document.getElementById('time-slider').value = getCurrentTimeAsFloat();
            updateMoonPosition();
        });

        window.onload = initMap;
    </script>
</body>
</html>
